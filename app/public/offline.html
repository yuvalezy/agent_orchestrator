<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>AO Founder — Offline</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        display: grid; place-items: center; padding: 2rem;
        background: radial-gradient(120% 60% at 50% -10%, rgba(245, 158, 11, 0.10), transparent 60%), #0a0a0c;
        color: #f4f4f5;
        font-family: "Roboto", "Segoe UI", system-ui, -apple-system, sans-serif;
        text-align: center; -webkit-tap-highlight-color: transparent;
      }
      .mark {
        width: 64px; height: 64px; margin: 0 auto 1.25rem; border-radius: 20px;
        display: grid; place-items: center;
        background: linear-gradient(135deg, #fbbf24, #d97706); color: #0a0a0c; font-size: 30px;
        box-shadow: 0 12px 30px rgba(245, 158, 11, 0.25);
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
      p { color: #a1a1aa; font-size: 0.9rem; line-height: 1.5; max-width: 22rem; margin: 0 auto 1.5rem; }
      button {
        font: inherit; font-weight: 600; color: #0a0a0c; border: 0; cursor: pointer;
        padding: 0.75rem 1.5rem; border-radius: 9999px;
        background: linear-gradient(135deg, #fbbf24, #d97706);
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark">✦</div>
      <h1>You're offline</h1>
      <p>The conversation will reload as soon as you're back on a connection.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
